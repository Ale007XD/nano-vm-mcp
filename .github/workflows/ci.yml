name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем зависимости бота
          pip install -r requirements.txt
          # Явно ставим инструменты для CI
          pip install ruff pytest

      - name: Lint (ruff)
        # Проверяем папку с кодом бота (app) и тесты
        run: ruff check app/ tests/

      - name: Test (pytest)
        run: pytest tests/ -v

  # Блок публикации в PyPI закомментирован, так как nano-vm-bot — это бот,
  # а не публичная python-библиотека. Бот не нужно отправлять в PyPI.
  # Если тебе нужен деплой (например, сборка Docker-образа), 
  # этот шаг следует переписать под docker/build-push-action.
  
