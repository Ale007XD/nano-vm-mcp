name: Auto-fix Code Style

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run auto-fix on"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || inputs.branch }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Fix lint issues (safe fixes)
        # || true: ruff возвращает exit 1 если остались неавтофиксируемые ошибки (E501 и др.)
        # Это нормально — CI-проверка их поймает отдельно
        run: ruff check . --fix || true

      - name: Format code
        run: ruff format .

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # [skip ci] предотвращает бесконечный цикл: push → fix → push → fix → ...
          commit_message: "style: auto-fix linting [skip ci]"
          branch: ${{ github.event_name == 'push' && github.ref_name || inputs.branch }}
